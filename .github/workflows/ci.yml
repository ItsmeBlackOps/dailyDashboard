name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      LOG_LEVEL: warn
      MONGODB_URI: mongodb://127.0.0.1:27017/daily-dashboard-test
      DB_NAME: dailyDashboardTest
      JWT_SECRET: ci-test-jwt-secret
      TEST_USER_EMAIL: ci.admin@example.com
      TEST_USER_PASSWORD: P@ssw0rd!
      TEST_USER_ROLE: admin
      NEW_RELIC_NO_CONFIG_FILE: 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Seed integration test data
        run: node scripts/seed-test-data.mjs
        working-directory: backend

      - name: Run backend tests
        run: npm test
        working-directory: backend

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: http://localhost:3004
      NEW_RELIC_NO_CONFIG_FILE: 'true'
      NODE_ENV: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests
        run: npm test
        working-directory: frontend
