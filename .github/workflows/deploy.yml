name: Deploy to VM

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target_color:
        description: "Force deploy to specific color (auto = inactive)"
        required: false
        default: "auto"
        type: choice
        options: [auto, blue, green]

concurrency:
  group: deploy-vm
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy on VM
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Best-effort host-key pre-seed. The deploy ssh below uses
          # StrictHostKeyChecking=accept-new, so it records the key on first
          # connect regardless. A transient ssh-keyscan failure must NOT abort
          # the job (it was killing deploys ~14s in, under `bash -e`). Retry a
          # few times, then continue no matter the outcome.
          for i in 1 2 3; do
            if ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null; then break; fi
            sleep 3
          done || true

      - name: Run deploy script on VM
        env:
          TARGET_COLOR: ${{ github.event.inputs.target_color || 'auto' }}
          GIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
        run: |
          # Retry ONLY on ssh connection failures (exit 255). The VM's port 22
          # intermittently times out for ~1-2 min and was failing deploys
          # (e.g. runs 26910059867, 26912713258). A non-255 exit is the deploy
          # script's OWN failure -> fail immediately, do NOT re-run it.
          # cicd-deploy.sh is re-entrant (detects active colour, builds the
          # inactive one), so re-attempting after a failed CONNECT is safe.
          set +e
          attempt=0
          max=3
          while :; do
            attempt=$((attempt + 1))
            ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes \
              -o ConnectTimeout=30 \
              -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
              ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} \
              "cd ${{ secrets.VM_PATH }} && \
               git fetch origin && \
               git reset --hard origin/main && \
               chmod +x scripts/*.sh && \
               export GIT_SHA='${GIT_SHA}' && \
               export GIT_REF='${GIT_REF}' && \
               export ACTOR='${ACTOR}' && \
               export TARGET_COLOR='${TARGET_COLOR}' && \
               bash scripts/cicd-deploy.sh"
            code=$?
            if [ "$code" -eq 0 ]; then
              echo "deploy ssh succeeded (attempt ${attempt})"
              exit 0
            fi
            if [ "$code" -ne 255 ]; then
              echo "deploy script failed (exit ${code}) — not a connection error, not retrying"
              exit "$code"
            fi
            if [ "$attempt" -ge "$max" ]; then
              echo "ssh connection error (exit 255) after ${attempt} attempts — giving up"
              exit 255
            fi
            echo "ssh connection error (exit 255) on attempt ${attempt}; retrying in 30s…"
            sleep 30
          done

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
