<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Interview Meeting Detector — Status</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; max-width: 560px; margin: 24px auto; padding: 0 20px; color: #1b1b1b; }
    h1 { font-size: 20px; font-weight: 600; }
    p { color: #555; line-height: 1.6; font-size: 14px; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 16px; margin-top: 16px; }
    .row { display: flex; align-items: center; gap: 8px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex: none; }
    .green { background: #1D9E75; } .amber { background: #EF9F27; }
    .status-title { font-size: 15px; font-weight: 600; }
    .meta { font-size: 13px; color: #555; margin-top: 8px; line-height: 1.7; }
    .meta code { background: #f3f3f3; padding: 1px 5px; border-radius: 4px; }
    a.btn { display: inline-block; margin-top: 12px; padding: 9px 16px; border: 0; border-radius: 8px; background: #1D9E75; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; }
  </style>
</head>
<body>
  <h1>Interview Meeting Detector</h1>
  <p>
    Marks your interview as <strong>started</strong> on the Daily Dashboard the moment you actually
    join the Teams call. It sets itself up using your dashboard login —
    <strong>there is nothing to configure</strong>.
  </p>

  <div class="card">
    <div class="row">
      <span id="statusDot" class="dot amber"></span>
      <span id="statusTitle" class="status-title">Checking…</span>
    </div>
    <div id="statusMeta" class="meta"></div>
    <a id="openDashboard" class="btn" href="https://dailydf.silverspace.tech" target="_blank" rel="noopener">Open the dashboard</a>
  </div>

  <script src="options.js"></script>
</body>
</html>
