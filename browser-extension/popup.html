<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; width: 280px; margin: 0; padding: 14px 16px; color: #1b1b1b; }
    h1 { font-size: 14px; font-weight: 600; margin: 0 0 10px; }
    .row { display: flex; align-items: center; gap: 8px; font-size: 13px; margin: 6px 0; }
    .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
    .green { background: #1D9E75; } .gray { background: #bbb; } .red { background: #E24B4A; }
    .muted { color: #666; }
    a { color: #185FA5; font-size: 13px; cursor: pointer; }
    .state { font-weight: 600; }
  </style>
</head>
<body>
  <h1>Interview Meeting Detector</h1>
  <div class="row"><span id="enrollDot" class="dot gray"></span><span id="enroll">Checking…</span></div>
  <div class="row"><span class="muted">Last report:</span> <span id="last" class="state">—</span></div>
  <div class="row"><a id="setup">View status</a></div>
  <script src="popup.js"></script>
</body>
</html>
