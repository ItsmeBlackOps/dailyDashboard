version: "3.9"

services:
  gateway:
    image: nginx:alpine
    container_name: dailydb-gateway
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}" # Frontend Port
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro

  # --- BLUE STACK ---
  backend-blue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dailydb-backend-blue
    env_file:
      - .env
    expose:
      - "${PORT}" # Internal only
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:' + (process.env.PORT || '3004') + '/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

  frontend-blue:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dailydb-frontend-blue
    env_file:
      - .env
    expose:
      - "${FRONTEND_PORT}" # Internal only
    environment:
      VITE_PUBLIC_POSTHOG_KEY: ${VITE_PUBLIC_POSTHOG_KEY}
      VITE_PUBLIC_POSTHOG_HOST: ${VITE_PUBLIC_POSTHOG_HOST}
      # API_URL removed to allow relative path fallback
      FRONTEND_PORT: ${FRONTEND_PORT}
      NEW_RELIC_LICENSE_KEY: ${NEW_RELIC_LICENSE_KEY}
      NEW_RELIC_APP_NAME: ${NEW_RELIC_APP_NAME}
      NEW_RELIC_LOG_LEVEL: ${NEW_RELIC_LOG_LEVEL}
      NEW_RELIC_NO_CONFIG_FILE: ${NEW_RELIC_NO_CONFIG_FILE}
    restart: unless-stopped
    depends_on:
      - backend-blue
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:' + (process.env.FRONTEND_PORT || '8180') + '/').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

  # --- GREEN STACK ---
  backend-green:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dailydb-backend-green
    env_file:
      - .env
    expose:
      - "${PORT}" # Internal only
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:' + (process.env.PORT || '3004') + '/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s
  
  frontend-green:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dailydb-frontend-green
    env_file:
      - .env
    expose:
      - "${FRONTEND_PORT}" # Internal only
    environment:
      VITE_PUBLIC_POSTHOG_KEY: ${VITE_PUBLIC_POSTHOG_KEY}
      VITE_PUBLIC_POSTHOG_HOST: ${VITE_PUBLIC_POSTHOG_HOST}
      # API_URL removed to allow relative path fallback
      FRONTEND_PORT: ${FRONTEND_PORT}
      NEW_RELIC_LICENSE_KEY: ${NEW_RELIC_LICENSE_KEY}
      NEW_RELIC_APP_NAME: ${NEW_RELIC_APP_NAME}
      NEW_RELIC_LOG_LEVEL: ${NEW_RELIC_LOG_LEVEL}
      NEW_RELIC_NO_CONFIG_FILE: ${NEW_RELIC_NO_CONFIG_FILE}
    restart: unless-stopped
    depends_on:
      - backend-green
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:' + (process.env.FRONTEND_PORT || '8180') + '/').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s
