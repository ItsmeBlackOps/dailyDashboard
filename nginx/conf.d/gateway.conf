# Upstream for Backend
upstream backend {
    include /etc/nginx/conf.d/upstreams/backend.active.conf;
}

# Upstream for Frontend
upstream frontend {
    include /etc/nginx/conf.d/upstreams/frontend.active.conf;
}

# Frontend Gateway (Listens on internal 8180, exposed to host 8180)
server {
    listen 8180;
    client_max_body_size 50M;
    # Hashed Vite assets (JobsListPage-BQY0PDWp.js etc.) — content-
    # addressed filenames mean they're safe to cache forever. Browsers
    # never re-request the same chunk file because new builds get new
    # hashes, so 'immutable' is correct.
    location /assets/ {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Hashed assets are immutable — long cache + immutable hint.
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        proxy_pass http://frontend;
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # index.html (and any HTML shell) MUST NOT be cached. After a
        # deploy the OLD index.html points to chunk filenames that no
        # longer exist on the new server — browsers holding it would
        # 404 on dynamic imports. no-cache forces revalidation each
        # nav so users always get the freshest chunk filenames.
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location /api {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Heavy aggregations (dashboard summary, candidate scope, jobs
        # pool refresh) can take >60s under load. The default 60s nginx
        # timeout was returning HTML 504 pages to the SPA, which then
        # tried to JSON-parse them and threw "Unexpected token '<'".
        # Bump generously — backend is internal-only behind this gateway.
        proxy_connect_timeout 30s;
        proxy_send_timeout    180s;
        proxy_read_timeout    180s;
    }

    location /socket.io {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
